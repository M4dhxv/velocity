<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GigGrab Autofill Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #333; margin-bottom: 30px; }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 100px;
      font-family: monospace;
      resize: vertical;
    }
    button {
      background: #007bff;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover { background: #0056b3; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      display: none;
    }
    .status.loading {
      display: block;
      background: #e3f2fd;
      color: #1976d2;
    }
    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
    }
    pre {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
    .sample-jobs {
      background: white;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .sample-jobs h3 { margin-top: 0; }
    .job-option {
      padding: 10px;
      margin: 5px 0;
      background: #f9f9f9;
      border-left: 3px solid #007bff;
      cursor: pointer;
      border-radius: 2px;
    }
    .job-option:hover {
      background: #f0f7ff;
    }
  </style>
</head>
<body>
  <h1>🚀 GigGrab Autofill Test</h1>

  <div class="sample-jobs">
    <h3>Sample Frontend Jobs (Click to use)</h3>
    <div class="job-option" onclick="loadSampleJob('fe1')">
      <strong>Frontend Engineer - React</strong><br>
      <small>Stripe • Remote • San Francisco, CA</small>
    </div>
    <div class="job-option" onclick="loadSampleJob('fe2')">
      <strong>Senior Frontend Developer</strong><br>
      <small>Retool • Remote • New York, NY</small>
    </div>
    <div class="job-option" onclick="loadSampleJob('fe3')">
      <strong>Web Developer - Vue.js</strong><br>
      <small>Vercel • Hybrid • Austin, TX</small>
    </div>
  </div>

  <form id="autofillForm">
    <div class="form-group">
      <label for="jobUrl">Job URL</label>
      <input
        type="url"
        id="jobUrl"
        placeholder="https://jobs.lever.co/stripe/..."
        required
      />
    </div>

    <div class="form-group">
      <label for="company">Company</label>
      <input type="text" id="company" placeholder="e.g., Stripe" required />
    </div>

    <div class="form-group">
      <label for="roleTitle">Role Title</label>
      <input
        type="text"
        id="roleTitle"
        placeholder="e.g., Frontend Engineer"
        required
      />
    </div>

    <div class="form-group">
      <label for="formAnswers">Form Answers (JSON)</label>
      <textarea id="formAnswers" placeholder='{ "firstName": "John", "lastName": "Doe", "email": "john@example.com" }' required></textarea>
    </div>

    <div class="form-group">
      <label for="resumeUrl">Resume URL</label>
      <input
        type="url"
        id="resumeUrl"
        placeholder="https://example.com/resume.pdf"
        required
      />
    </div>

    <div class="form-group">
      <label for="jwtToken">JWT Token (your Supabase token)</label>
      <input
        type="password"
        id="jwtToken"
        placeholder="ey..."
        required
      />
    </div>

    <button type="submit">🎯 Submit to Autofill Queue</button>
    <button type="button" onclick="generateJWT()">📋 Generate Test JWT</button>
  </form>

  <div class="status" id="status"></div>

  <script>
    const SAMPLE_JOBS = {
      fe1: {
        jobUrl: 'https://jobs.lever.co/stripe/frontend-engineer',
        company: 'Stripe',
        roleTitle: 'Frontend Engineer - React',
        formAnswers: {
          firstName: 'Test',
          lastName: 'User',
          email: 'test@giggrab.dev',
          phone: '+1-555-0000',
        },
        resumeUrl: 'https://example.com/resume.pdf',
      },
      fe2: {
        jobUrl: 'https://jobs.lever.co/retool/senior-frontend',
        company: 'Retool',
        roleTitle: 'Senior Frontend Developer',
        formAnswers: {
          firstName: 'Test',
          lastName: 'User',
          email: 'test@giggrab.dev',
          phone: '+1-555-0000',
        },
        resumeUrl: 'https://example.com/resume.pdf',
      },
      fe3: {
        jobUrl: 'https://jobs.lever.co/vercel/web-developer-vue',
        company: 'Vercel',
        roleTitle: 'Web Developer - Vue.js',
        formAnswers: {
          firstName: 'Test',
          lastName: 'User',
          email: 'test@giggrab.dev',
          phone: '+1-555-0000',
        },
        resumeUrl: 'https://example.com/resume.pdf',
      },
    };

    function loadSampleJob(key) {
      const job = SAMPLE_JOBS[key];
      document.getElementById('jobUrl').value = job.jobUrl;
      document.getElementById('company').value = job.company;
      document.getElementById('roleTitle').value = job.roleTitle;
      document.getElementById('formAnswers').value = JSON.stringify(
        job.formAnswers,
        null,
        2
      );
      document.getElementById('resumeUrl').value = job.resumeUrl;
    }

    function generateJWT() {
      alert(
        'JWT Generation:\n\n1. Sign in to your Supabase project\n2. Go to Settings > API\n3. Copy your "anon" or "service_role" key\n4. Paste it above\n\nFor testing, use an authenticated user token from the Supabase auth table.'
      );
    }

    document.getElementById('autofillForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const statusDiv = document.getElementById('status');
      const jwtToken = document.getElementById('jwtToken').value;

      // Parse form answers
      let formAnswers;
      try {
        formAnswers = JSON.parse(document.getElementById('formAnswers').value);
      } catch (err) {
        showStatus('error', `Invalid JSON in Form Answers: ${err.message}`);
        return;
      }

      const payload = {
        jobId: `test-${Date.now()}`, // Unique ID for testing
        jobUrl: document.getElementById('jobUrl').value,
        company: document.getElementById('company').value,
        roleTitle: document.getElementById('roleTitle').value,
        domain: new URL(document.getElementById('jobUrl').value).hostname,
        formAnswers,
        resumeUrl: document.getElementById('resumeUrl').value,
        scheduledDelayMs: 5000,
      };

      showStatus('loading', 'Submitting job to autofill queue...');

      try {
        const response = await fetch('/api/autofill', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${jwtToken}`,
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();

        if (!response.ok) {
          showStatus(
            'error',
            `Error (${response.status}): ${data.error || JSON.stringify(data)}`
          );
          return;
        }

        showStatus(
          'success',
          `✅ Job queued!\n\nJob ID: ${data.bullmqJobId}\nStatus: ${data.status}\n\n${JSON.stringify(data, null, 2)}`
        );
      } catch (err) {
        showStatus('error', `Network error: ${err.message}`);
      }
    });

    function showStatus(type, message) {
      const statusDiv = document.getElementById('status');
      statusDiv.className = `status ${type}`;
      statusDiv.innerHTML = `<strong>${type === 'success' ? '✅' : type === 'error' ? '❌' : '⏳'}</strong><br><pre>${message}</pre>`;
    }
  </script>
</body>
</html>
